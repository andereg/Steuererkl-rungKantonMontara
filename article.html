<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artikel</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="https://analytics.lucasreitmann.me/script.js" data-website-id="bb085154-e170-4b29-9579-e566ca8c9c13"></script>
</head>
<body>
<div class="page">
  <header class="site-header">
    <div class="title-wrap">
      <div class="badge">
        <img src="Kanton%20Montara.png" height="50" />
        Kanton Montara
      </div>
      <h1 id="articleTitle">Artikel</h1>
      <p id="articleSubtitle" class="subtitle" style="display:none;"></p>
    </div>
    <div class="status-box">
      <div id="articleAuthorRow" style="display:none;"><strong>Author:</strong> <span id="articleAuthor"></span></div>
      <div id="articleDateRow" style="display:none;"><strong>Datum:</strong> <span id="articleDate"></span></div>
    </div>
    <script src="posthog.js"></script>
  </header>

  <nav class="top-nav">
    <a href="index.html">Startseite</a>
    <a href="themes.html">Themen</a>
    <a href="taxform.html">Steuererklärung</a>
    <a href="search.html">Suche</a>
  </nav>
  <main>
    <section class="box intro-box" id="articleIntro" style="display:none;">
      <div id="articleIntroContent"></div>
    </section>

    <section class="box">
      <div id="articleContent"></div>
    </section>

    <section class="box action-box">
      <div class="button-row">
        <button type="button" onclick="history.back()">Zurück</button>
        <button type="button" class="primary-button" onclick="window.scrollTo({ top: 0, behavior: 'smooth' })">
          Nach oben
        </button>
      </div>
      <p id="messageBox" class="message-box"></p>
    </section>
  </main>

  <footer class="site-footer">
    <p id="articleFooter">Kanton Montara</p>
  </footer>
</div>
<script src="articles.js"></script>
<script>
  function renderArticle(data) {
    document.title = data.title || "Artikel";

    const titleEl = document.getElementById("articleTitle");
    const subtitleEl = document.getElementById("articleSubtitle");
    const authorEl = document.getElementById("articleAuthor");
    const dateEl = document.getElementById("articleDate");

    const authorRow = document.getElementById("articleAuthorRow");
    const dateRow = document.getElementById("articleDateRow");

    const contentEl = document.getElementById("articleContent");
    const footerEl = document.getElementById("articleFooter");

    const introSection = document.getElementById("articleIntro");
    const introContent = document.getElementById("articleIntroContent");

    titleEl.textContent = data.title || "";

    subtitleEl.style.display = data.subtitle ? "" : "none";
    subtitleEl.textContent = data.subtitle || "";

    authorRow.style.display = data.author ? "" : "none";
    authorEl.textContent = data.author || "";

    dateRow.style.display = data.date ? "" : "none";
    dateEl.textContent = data.date || "";


    if (data.intro) {
      introContent.innerHTML = data.intro;
      introSection.style.display = "";
    } else {
      introSection.style.display = "none";
    }

    contentEl.innerHTML = data.content || "";

    footerEl.textContent =
            data.author && data.date
                    ? `${data.author}, ${data.date}`
                    : data.author || data.date || "Kanton Montara";
  }

  function getArticleFromUrl() {
    const hash = window.location.hash.replace("#", "");
    const index = parseInt(hash, 10);

    if (!isNaN(index) && index >= 1 && index <= window.ARTICLES.length) {
      return window.ARTICLES[index - 1];
    }

    return window.ARTICLES[0];
  }

  function loadArticle() {
    const article = getArticleFromUrl();
    renderArticle(article);
  }

  loadArticle();
  window.addEventListener("hashchange", loadArticle);
</script>
<script>
  const hash = window.location.hash.replace("#", "");

  posthog.capture('article_viewed', {
    article_id: parseInt(hash, 10),
    article_title: document.getElementById("articleTitle").textContent,
  });

  var startTime = Date.now();

  setTimeout(function() {
    posthog.capture('article_engaged', {
      article_id: parseInt(hash, 10),
      article_title: document.getElementById("articleTitle").textContent,
      time_on_page: Math.round((Date.now() - startTime) / 1000)
    });
  }, 30000); // 30 seconds
</script>
</body>
</html>
